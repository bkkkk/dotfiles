# mise global tool configuration
# Managed by dotfiles — do not edit ~/.config/mise/config.toml directly.
# Edit ~/dotfiles/mise/config.toml instead.
#
# Version pinning policy: tools use "latest" intentionally.
# This dotfiles repo prioritizes current tools over reproducibility.
# Reproducible pinned environments are managed per-project via
# .mise.toml files in project roots (mybox will formalize this).

[tools]
python = "3.14"
uv = "latest"
bat = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
delta = "latest"
starship = "latest"
zoxide = "latest"
direnv = "latest"
# git-cliff = "latest"
shellcheck = "latest"
"github:BurntSushi/ripgrep" = "latest"
# "github:Canop/broot" = "latest"
# "github:fletcher/MultiMarkdown-6" = "latest"
# markdownlint-cli2 = "latest"
gh = "latest"
# tflint = "latest"

[settings]
python.uv_venv_auto = "source"
